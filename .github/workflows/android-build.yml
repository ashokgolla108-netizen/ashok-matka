name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ✅ FIX: Use JDK 17 instead of 11
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create and Build
        run: |
          # Create project
          cordova create village_app com.ashok.village45 Village45

          # Copy your files
          cp index.html dashboard.html admin.html auth.js village_app/www/

          # Move into project
          cd village_app

          # Add Android platform
          cordova platform add android

          # Build APK
          cordova build android --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Village45-APK
          path: village_app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
