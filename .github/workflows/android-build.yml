name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          path: main_repo

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create and Build
        run: |
          # 1. Create a fresh cordova project
          cordova create village_app com.ashok.village45 Village45
          
          # 2. Copy your files from the checked-out folder into the app
          cp main_repo/index.html village_app/www/
          cp main_repo/dashboard.html village_app/www/
          cp main_repo/admin.html village_app/www/
          cp main_repo/auth.js village_app/www/
          
          # 3. Build the APK
          cd village_app
          cordova platform add android@12.0.0 --no-telemetry
          cordova build android --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Village45-APK
          path: village_app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
          
