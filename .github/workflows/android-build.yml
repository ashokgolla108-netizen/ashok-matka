name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create and Build App
        run: |
          # 1. Create a fresh Cordova project
          cordova create my_app com.ashok.village45 Village45
          cd my_app
          
          # 2. Add Android platform
          cordova platform add android@12.0.0 --no-telemetry
          
          # 3. Copy YOUR files from GitHub into the app's web folder
          cp ../index.html www/ 2>/dev/null || true
          cp ../dashboard.html www/ 2>/dev/null || true
          cp ../admin.html www/ 2>/dev/null || true
          cp ../auth.js www/ 2>/dev/null || true
          
          # 4. Build the APK
          cordova build android --debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Village45-APK
          path: my_app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
          
