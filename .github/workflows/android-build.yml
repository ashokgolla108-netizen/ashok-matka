name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Setup Cordova Project
        run: |
          # Create the app container
          cordova create build_app com.ashok.village45 Village45
          
          # Clean default files and copy your code
          rm -rf build_app/www/*
          
          # Copy only relevant web files to avoid recursion errors
          cp index.html build_app/www/ 2>/dev/null || true
          cp dashboard.html build_app/www/ 2>/dev/null || true
          cp admin.html build_app/www/ 2>/dev/null || true
          cp auth.js build_app/www/ 2>/dev/null || true
          
          # If you have folders like 'css' or 'js', copy them too:
          # cp -r css build_app/www/ 2>/dev/null || true

      - name: Build Android Platform
        run: |
          cd build_app
          cordova platform add android@12.0.0 --no-telemetry
          cordova build android --debug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Village45-APK
          path: build_app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
          
