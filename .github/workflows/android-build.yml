name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Build APK
        run: |
          # 1. Create a project in a separate folder
          cordova create build_dir com.ashok.village45 Village45
          
          # 2. Copy your files into that folder's web directory
          # Using '.' ensures we grab them from your main GitHub folder
          cp index.html build_dir/www/ 2>/dev/null || true
          cp dashboard.html build_dir/www/ 2>/dev/null || true
          cp admin.html build_dir/www/ 2>/dev/null || true
          cp auth.js build_dir/www/ 2>/dev/null || true
          
          # 3. Enter the folder and build
          cd build_dir
          cordova platform add android@12.0.0 --no-telemetry
          cordova build android --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Village45-APK
          path: build_dir/platforms/android/app/build/outputs/apk/debug/app-debug.apk
          
