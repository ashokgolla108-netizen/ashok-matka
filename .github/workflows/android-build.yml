name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create and Build
        run: |
          # 1. Create a fresh project in a temporary folder
          cordova create ../temp_app com.ashok.village45 Village45
          
          # 2. Add the Android platform
          cd ../temp_app
          cordova platform add android@12.0.0 --no-telemetry
          
          # 3. Copy your files from the main folder into the app
          # We use '../' because we are currently inside the 'temp_app' folder
          cp ../ashok-matka/index.html www/ 2>/dev/null || cp ../index.html www/
          cp ../ashok-matka/dashboard.html www/ 2>/dev/null || cp ../dashboard.html www/
          cp ../ashok-matka/admin.html www/ 2>/dev/null || cp ../admin.html www/
          cp ../ashok-matka/auth.js www/ 2>/dev/null || cp ../auth.js www/
          
          # 4. Build the APK
          cordova build android --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Village45-APK
          path: ../temp_app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
          
