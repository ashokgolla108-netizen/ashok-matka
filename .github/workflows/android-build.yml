name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Setup Android SDK
        # This step ensures the Android tools and licenses are ready
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-33" "build-tools;33.0.2" "platform-tools"

      - name: Create and Build
        run: |
          # 1. Create a fresh cordova project
          cordova create village_app com.ashok.village45 Village45
          
          # 2. Copy files into the Cordova 'www' folder
          # No 'main_repo' prefix needed since we are in the root
          cp index.html village_app/www/
          cp dashboard.html village_app/www/
          cp admin.html village_app/www/
          cp auth.js village_app/www/

          # 3. Build the APK
          cd village_app
          cordova platform add android@12.0.0 --no-telemetry
          cordova build android --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Village45-APK
          path: village_app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
          
